services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: hcmis
      POSTGRES_USER: hcmis
      POSTGRES_PASSWORD: hcmis
    ports:
      - "${POSTGRES_HOST_PORT:-15432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_HOST_PORT:-16379}:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
